<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F5D76E;
    --deep: #0a0a0f;
    --navy: #080c1a;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --glow-blue: #4a90d9;
    --glow-purple: #7b5ea7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  /* ── 3D Sulaymaniyah Background ── */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-canvas canvas {
    width: 100%;
    height: 100%;
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: 
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(74,144,217,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(123,94,167,0.12) 0%, transparent 50%),
      linear-gradient(180deg, rgba(8,12,26,0.55) 0%, rgba(10,10,15,0.75) 60%, rgba(10,10,15,0.95) 100%);
  }

  /* ── Stars ── */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: var(--min); transform: scale(0.8); }
    to   { opacity: var(--max); transform: scale(1.2); }
  }

  /* ── Page Container ── */
  .page {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── Profile ── */
  .profile {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeDown {
    from { opacity:0; transform: translateY(-24px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .avatar-ring {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--gold), var(--glow-blue), var(--glow-purple), var(--gold));
    background-size: 300% 300%;
    animation: gradShift 4s ease infinite;
    margin: 0 auto 16px;
    box-shadow: 0 0 40px rgba(212,175,55,0.3), 0 0 80px rgba(74,144,217,0.15);
  }

  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

    font-size: 26px;

    color: #fff;
    letter-spacing: -0.5px;
    text-shadow: 0 0 30px rgba(212,175,55,0.4);
  }

    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .city-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 4px 14px;
    background: rgba(212,175,55,0.1);
    border: 1px solid rgba(212,175,55,0.25);

    font-size: 12px;
    color: var(--gold-light);
    font-weight: 500;

  /* ── Link Cards ── */
  .links-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    text-decoration: none;
    color: #fff;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.25s, box-shadow 0.25s;
    backdrop-filter: blur(12px);
    animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  .link-card:nth-child(1) { animation-delay: 0.1s; }
  .link-card:nth-child(2) { animation-delay: 0.18s; }
  .link-card:nth-child(3) { animation-delay: 0.26s; }
  .link-card:nth-child(4) { animation-delay: 0.34s; }
  .link-card:nth-child(5) { animation-delay: 0.42s; }
  .link-card:nth-child(6) { animation-delay: 0.50s; }
  .link-card:nth-child(7) { animation-delay: 0.58s; }

  @keyframes slideUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--hover-glow);
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: inherit;
  }

  .link-card:hover::before { opacity: 1; }

    transform: translateY(-3px) scale(1.015);
    border-color: var(--accent-color);
    box-shadow: 0 8px 32px var(--shadow-color);

<script>
// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*70}%;
    width:${size}px; height:${size}px;
    --min:${(Math.random()*0.3+0.1).toFixed(2)};
    --max:${(Math.random()*0.5+0.4).toFixed(2)};
    --d:${(Math.random()*3+2).toFixed(1)}s;
    animation-delay:${(Math.random()*5).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// ── Particles ──
const partEl = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left:${Math.random()*100}%;
    bottom:${Math.random()*30}%;
    --dur:${(Math.random()*4+3).toFixed(1)}s;
    --delay:${(Math.random()*6).toFixed(1)}s;
  `;
  partEl.appendChild(p);
}

// ── 3D City Skyline (Sulaymaniyah) ──
const canvas = document.getElementById('cityCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drawCity();
}

function drawCity() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#02040e');
  sky.addColorStop(0.5, '#060c1e');
  sky.addColorStop(1, '#0d1530');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // City buildings
  drawBuildings(ctx, W, H);

  // Ground glow
  const grd = ctx.createLinearGradient(0, H*0.72, 0, H);
  grd.addColorStop(0, 'rgba(74,144,217,0.08)');
  grd.addColorStop(1, 'rgba(10,10,20,0.0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, H*0.72, W, H*0.28);

  // Horizon glow
  const hGlow = ctx.createRadialGradient(W/2, H*0.73, 10, W/2, H*0.73, W*0.6);
  hGlow.addColorStop(0, 'rgba(74,144,217,0.15)');
  hGlow.addColorStop(0.4, 'rgba(123,94,167,0.06)');
  hGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = hGlow;
  ctx.fillRect(0, 0, W, H);
}

function drawMountains(ctx, W, H) {
  const baseY = H * 0.62;

  // Far mountains (lighter)
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, baseY + H*0.05);
  ctx.lineTo(W*0.08, baseY - H*0.12);
  ctx.lineTo(W*0.18, baseY + H*0.02);
  ctx.lineTo(W*0.28, baseY - H*0.18);  // Goizha
  ctx.lineTo(W*0.38, baseY - H*0.06);
  ctx.lineTo(W*0.48, baseY - H*0.22);  // Azmar peak
  ctx.lineTo(W*0.58, baseY - H*0.08);
  ctx.lineTo(W*0.68, baseY - H*0.15);
  ctx.lineTo(W*0.78, baseY - H*0.04);
  ctx.lineTo(W*0.88, baseY - H*0.13);
  ctx.lineTo(W, baseY - H*0.05);
  ctx.lineTo(W, H);
  ctx.closePath();
  
  const mGrad = ctx.createLinearGradient(0, baseY - H*0.2, 0, baseY + H*0.05);
  mGrad.addColorStop(0, '#1a2540');
  mGrad.addColorStop(0.5, '#131c33');
  mGrad.addColorStop(1, '#0e1525');
  ctx.fillStyle = mGrad;
  ctx.fill();

  // Snow caps on peaks
  const peaks = [
    [W*0.28, baseY - H*0.18, W*0.025],
    [W*0.48, baseY - H*0.22, W*0.03],
    [W*0.68, baseY - H*0.15, W*0.022],
  ];
  peaks.forEach(([px, py, pw]) => {
    ctx.beginPath();
    ctx.moveTo(px - pw, py + pw*0.6);
    ctx.lineTo(px, py);
    ctx.lineTo(px + pw, py + pw*0.6);
    ctx.closePath();
    ctx.fillStyle = 'rgba(200,220,255,0.07)';
    ctx.fill();
  });
}

function drawBuildings(ctx, W, H) {
  const groundY = H * 0.73;
  const buildings = generateBuildings(W, groundY);

  buildings.forEach(b => {
    // Shadow/depth side
    ctx.fillStyle = b.shadow;
    ctx.fillRect(b.x + b.w, b.y, b.w * 0.18, b.h);

    // Main face
    const bGrad = ctx.createLinearGradient(b.x, b.y, b.x, groundY);
    bGrad.addColorStop(0, b.topColor);
    bGrad.addColorStop(1, b.botColor);
    ctx.fillStyle = bGrad;
    ctx.fillRect(b.x, b.y, b.w, b.h);

    // Windows
    drawWindows(ctx, b);

    // Rooftop light
    if (b.h > H * 0.12) {
      ctx.beginPath();
      ctx.arc(b.x + b.w/2, b.y, 2, 0, Math.PI*2);
      ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,80,80,0.8)' : 'rgba(255,200,80,0.6)';
      ctx.fill();
    }
  });
}

function generateBuildings(W, groundY) {
  const buildings = [];
  let x = 0;
  while (x < W) {
    const w = Math.random() * (W*0.055) + W*0.02;
    const maxH = groundY * 0.55;
    const minH = groundY * 0.08;
    const h = Math.random() * (maxH - minH) + minH;
    const y = groundY - h;

    const isDark = Math.random() > 0.4;
    buildings.push({
      x, y, w, h,
      topColor: isDark ? '#1a2240' : '#243058',
      botColor: isDark ? '#0d1225' : '#131a30',
      shadow: isDark ? 'rgba(0,0,5,0.6)' : 'rgba(5,10,25,0.5)',
      winColor: Math.random() > 0.3 ? 'rgba(255,230,150,0.7)' : 'rgba(180,210,255,0.5)',
    });
    x += w + Math.random() * (W*0.005);
  }
  return buildings;
}

function drawWindows(ctx, b) {
  const ww = Math.max(2, b.w * 0.18);
  const wh = Math.max(2, b.h * 0.08);
  const cols = Math.floor(b.w / (ww * 2.2));
  const rows = Math.floor(b.h / (wh * 2.5));
  if (cols < 1 || rows < 1) return;

  const padX = (b.w - cols * ww * 2.2 + ww * 1.2) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() > 0.35) {
        ctx.fillStyle = b.winColor;
        ctx.fillRect(
          b.x + padX + c * ww * 2.2,
          b.y + wh * 1.5 + r * wh * 2.5,
          ww, wh
        );
      }
    }
  }
}

window.addEventListener('resize', resize);
resize();

// Subtle parallax on mouse move
document.addEventListener('mousemove', e => {
  const xPct = (e.clientX / window.innerWidth - 0.5) * 2;
  const yPct = (e.clientY / window.innerHeight - 0.5) * 2;
  document.querySelector('.page').style.transform =
    `translate(${xPct * -6}px, ${yPct * -3}px)`;
});
</script>
